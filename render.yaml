services:
  - type: web
    name: amoruda-cookies
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: amoruda
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
